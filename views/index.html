<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeatherApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #040a0f;
      --panel: rgba(0, 255, 200, 0.03);
      --border: rgba(0, 255, 200, 0.15);
      --cyan: #00ffc8;
      --cyan-dim: rgba(0, 255, 200, 0.4);
      --red: #ff3b5c;
      --text: #c8ffe8;
      --muted: #4a7a6a;
      --glow: 0 0 12px rgba(0, 255, 200, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,200,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 480px;
      padding: 20px;
      z-index: 10;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      border: 1px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--glow), inset 0 0 12px rgba(0,255,200,0.05);
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--cyan);
      text-shadow: var(--glow);
    }

    .header-sub {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Search panel */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    /* Corner decorations */
    .panel::before, .panel::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--cyan);
      border-style: solid;
    }
    .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .label {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 1px;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--cyan);
      box-shadow: var(--glow);
    }

    button {
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 2px;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    button:hover {
      background: rgba(0,255,200,0.08);
      box-shadow: var(--glow);
    }

    button:active { transform: scale(0.97); }

    /* Error */
    #error {
      display: none;
      font-size: 0.75rem;
      color: var(--red);
      letter-spacing: 1px;
      margin-top: 10px;
      padding: 8px 12px;
      border-left: 2px solid var(--red);
      background: rgba(255,59,92,0.05);
    }

    #error::before { content: '// '; opacity: 0.6; }

    /* Result panel */
    #result {
      display: none;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 24px 20px;
      position: relative;
      animation: fadeUp 0.4s ease both;
    }

    #result::before, #result::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--cyan);
      border-style: solid;
    }
    #result::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    #result::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .city-name {
      font-family: 'Orbitron', monospace;
      font-size: 1rem;
      color: var(--cyan);
      text-shadow: var(--glow);
      letter-spacing: 2px;
    }

    .condition-text {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    #icon {
      width: 56px;
      height: 56px;
      filter: drop-shadow(0 0 8px var(--cyan));
    }

    /* Temp display */
    .temp-display {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 20px;
    }

    .temp-value {
      font-family: 'Orbitron', monospace;
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 20px rgba(0,255,200,0.5);
      line-height: 1;
    }

    .temp-unit {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      color: var(--muted);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(to right, var(--cyan-dim), transparent);
      margin-bottom: 16px;
    }

    /* Stats grid */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      padding: 12px;
      border: 1px solid var(--border);
      position: relative;
    }

    .stat-label {
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      color: var(--text);
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--cyan);
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Loading state */
    .loading {
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--muted);
      padding: 16px 0;
      display: none;
    }

    .loading::after {
      content: '';
      display: inline-block;
      animation: dots 1.2s steps(3, end) infinite;
    }

    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
      100% { content: ''; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-icon">🛰</div>
      <div>
        <h1>WEATHER<span style="opacity:0.4">_</span>OS</h1>
        <div class="header-sub">ATMOSPHERIC MONITORING SYSTEM</div>
      </div>
    </div>

    <div class="panel">
      <div class="label">// CIDADE ESCOLHIDA</div>
      <div class="search-row">
        <input type="text" id="cityInput" placeholder="NOME DA CIDADE" autocomplete="off" />
        <button onclick="buscar()">BUSCAR</button>
      </div>
      <div id="error"></div>
      <div class="loading" id="loading">BUSCANDO DADOS</div>
    </div>

    <div id="result">
      <div class="result-header">
        <div>
          <div class="city-name" id="cityName"></div>
          <div class="condition-text" id="description"></div>
        </div>
        <img id="icon" src="" alt="" />
      </div>

      <div class="temp-display">
        <div class="temp-value" id="temp"></div>
        <div class="temp-unit">°C</div>
      </div>

      <div class="divider"></div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">// SENSAÇÃO TÉRMICA  </div>
          <div class="stat-value" id="feelsLike"></div>
        </div>
        <div class="stat">
          <div class="stat-label">// UMIDADE </div>
          <div class="stat-value" id="humidity"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const input = document.getElementById('cityInput');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') buscar();
    });

    async function buscar() {
      const city = input.value.trim();
      const errorEl  = document.getElementById('error');
      const resultEl = document.getElementById('result');
      const loadingEl= document.getElementById('loading');

      errorEl.style.display  = 'none';
      resultEl.style.display = 'none';
      loadingEl.style.display= 'none';

      if (!city) {
        errorEl.textContent = 'CITY FIELD CANNOT BE EMPTY';
        errorEl.style.display = 'block';
        return;
      }

      loadingEl.style.display = 'block';

      try {
        const res  = await fetch(`/weather?city=${encodeURIComponent(city)}`);
        const data = await res.json();

        loadingEl.style.display = 'none';

        if (!res.ok) {
          errorEl.textContent = data.error || 'REQUEST FAILED';
          errorEl.style.display = 'block';
          return;
        }

        document.getElementById('cityName').textContent    = `${data.city}, ${data.country}`;
        document.getElementById('icon').src                = data.icon;
        document.getElementById('temp').textContent        = Math.round(data.temp);
        document.getElementById('description').textContent = data.description.toUpperCase();
        document.getElementById('feelsLike').textContent   = `${Math.round(data.feels_like)}°C`;
        document.getElementById('humidity').textContent    = `${data.humidity}%`;

        resultEl.style.display = 'block';
      } catch (err) {
        loadingEl.style.display = 'none';
        errorEl.textContent = 'CONNECTION ERROR';
        errorEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
